version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: captchamaster-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: main_backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captchamaster-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/main_backend
      PORT: 3001
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs

volumes:
  mongodb_data:
  api_uploads:
  api_logs:
